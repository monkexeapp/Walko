<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6C4FE0">
<title>Walko</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

:root {
  --violet-900: #2D1B69;
  --violet-700: #4B2FB8;
  --violet-600: #6C4FE0;
  --violet-500: #8466F0;
  --violet-100: #EDE7FB;
  --violet-50: #F7F4FD;
  --white: #FFFFFF;
  --ink: #1A1530;
  --muted: #8B85A3;
  --line: #E8E3F7;
  --green: #3CB371;
  --orange: #F5A623;
  --radius-lg: 28px;
  --radius-md: 18px;
  --radius-sm: 12px;
  --shadow-card: 0 8px 24px rgba(76, 47, 184, 0.12);
  --shadow-btn: 0 6px 16px rgba(108, 79, 224, 0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: linear-gradient(135deg, var(--violet-700) 0%, var(--violet-600) 60%, var(--violet-500) 100%);
  color: var(--ink);
  font-family: 'Poppins', sans-serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  position: relative;
  overflow: hidden;
}
html.js-vh-fix #app { height: var(--app-height, 100vh); }

/* ===== HEADER ===== */
#header {
  background: transparent;
  padding: 10px 16px 14px;
  position: relative;
  z-index: 50;
  flex-shrink: 0;
}
#header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 2;
}
#brand {
  display: flex;
  align-items: center;
  gap: 8px;
}
#brand-mark {
  width: 34px; height: 34px;
  background: var(--white);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
#brand-name {
  color: var(--white);
  font-weight: 800;
  font-size: 16px;
  letter-spacing: -0.3px;
}
#gps-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.15);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 10px;
  color: rgba(255,255,255,0.85);
  font-weight: 500;
}
#gps-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #FFB454;
  flex-shrink: 0;
}
#gps-dot.active { background: #4ADE80; }

/* Progress bar section in header */
#progress-label {
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-weight: 400;
  margin-top: 12px;
  margin-bottom: -10px;
  position: relative;
  z-index: 2;
}
#progress-section {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
  position: relative;
  z-index: 2;
}
#progress-bar-track {
  flex: 0 1 60%;
  max-width: 60%;
  height: 6px;
  background: rgba(255,255,255,0.25);
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}
#progress-bar-fill {
  height: 100%;
  width: 0%;
  background: var(--white);
  border-radius: 20px;
  transition: width 0.5s ease;
}
#level-text {
  flex-shrink: 0;
  color: var(--white);
  font-size: 14px;
  font-weight: 500;
}
#level-text strong {
  font-weight: 800;
  font-size: 15px;
}
#progress-detail {
  color: rgba(255,255,255,0.75);
  font-size: 8.5px;
  font-weight: 500;
  margin-top: -3px;
  text-align: left;
}

/* ===== MAP ===== */
#map-wrap {
  flex: 1;
  min-height: 0;
  position: relative;
  margin: 0 10px;
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  z-index: 1;
}
#map { width: 142%; height: 142%; left: -21%; top: -21%; position: absolute; transform-origin: center center; }
#map.rotating { transition: none; }
#map:not(.rotating) { transition: transform 0.2s ease; }
#map .leaflet-container { background: #ECE7FA; font-family: 'Poppins', sans-serif; }
.leaflet-tile { filter: grayscale(0.3) brightness(1.05) sepia(0.15) hue-rotate(220deg) saturate(1.8) contrast(0.95); }

.player-icon-wrap {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.player-icon-halo {
  position: absolute;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(108,79,224,0.18);
}
.player-arrow {
  position: relative;
  width: 22px; height: 22px;
  transition: transform 0.35s ease;
  transform-origin: 50% 50%;
  filter: drop-shadow(0 2px 4px rgba(76,47,184,0.35));
}
.radar-leaflet-circle {
  filter: drop-shadow(0 0 6px rgba(108,79,224,0.7)) drop-shadow(0 0 12px rgba(108,79,224,0.4));
}

.cw-marker {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.2s;
}
.cw-marker img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25)); }
.cw-marker:hover { transform: scale(1.15); }
.cw-pending {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--white);
  border: 3px solid #B0AABF;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.cw-marker.nearby .cw-pending {
  border-color: var(--violet-600);
  animation: cwpulse 1s ease-in-out infinite;
}
@keyframes cwpulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(108,79,224,0.5); }
  50% { transform: scale(1.25); box-shadow: 0 0 0 8px rgba(108,79,224,0.0); }
}

/* recenter button */
#recenter-btn {
  position: absolute;
  bottom: 16px;
  right: 16px;
  width: 42px; height: 42px;
  background: var(--white);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(76,47,184,0.25);
  z-index: 1000;
  cursor: pointer;
}
#recenter-btn img { width: 22px; height: 22px; }

/* ===== BOTTOM SHEET ===== */
#bottom {
  background: var(--white);
  border-radius: 18px 18px 0 0;
  padding: 14px 14px calc(4px + env(safe-area-inset-bottom));
  box-shadow: 0 -8px 24px rgba(76,47,184,0.10);
  z-index: 200;
  flex-shrink: 0;
  margin-top: 6px;
  position: relative;
}
#bottom-extra {
  margin-top: 0;
  min-height: 0;
}
#stats-row {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.stat-card {
  flex: 1;
  background: var(--violet-50);
  border-radius: var(--radius-sm);
  padding: 5px 5px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.stat-icon-wrap {
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.stat-icon { width: 24px; height: 24px; object-fit: contain; }
.icon-nearby, .icon-total { width: 18px; height: 18px; }
.stat-val { font-size: 14px; font-weight: 800; color: var(--violet-700); line-height: 1; }
.stat-lbl { font-size: 8px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }

#collect-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--violet-600), var(--violet-700));
  color: var(--white);
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Poppins', sans-serif;
  font-size: 13.5px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: var(--shadow-btn);
  transition: transform 0.1s, opacity 0.2s;
}
#collect-btn:active { transform: scale(0.97); }
#collect-btn:disabled {
  background: var(--line);
  color: var(--muted);
  box-shadow: none;
  cursor: default;
}
#collect-btn img { width: 26px; height: 26px; }

/* ===== TOAST ===== */
#toast {
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%) translateY(-16px);
  background: var(--ink);
  color: var(--white);
  padding: 11px 20px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 999;
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast img { width: 18px; height: 18px; }

/* ===== LOADING / WELCOME ===== */
#loading {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, var(--violet-900) 0%, var(--violet-700) 55%, var(--violet-600) 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  z-index: 9999;
  padding: 24px;
  text-align: center;
}
#loading-mark {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
  filter: drop-shadow(0 12px 24px rgba(0,0,0,0.3));
}
#loading-mark img { width: 120px; height: 120px; }
#loading h1 {
  font-size: 34px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.5px;
}
#loading p {
  color: rgba(255,255,255,0.75);
  font-size: 14px;
  max-width: 280px;
  line-height: 1.6;
  font-weight: 400;
}
#start-btn {
  margin-top: 10px;
  padding: 15px 40px;
  background: var(--white);
  color: var(--violet-700);
  border: none;
  border-radius: var(--radius-md);
  font-family: 'Poppins', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
#demo-btn {
  margin-top: 14px;
  padding: 8px 16px;
  background: transparent;
  color: rgba(255,255,255,0.65);
  border: none;
  font-family: 'Poppins', sans-serif;
  font-size: 12.5px;
  font-weight: 500;
  text-decoration: underline;
  cursor: pointer;
}

.leaflet-control-attribution { font-size: 9px !important; opacity: 0.5; }

/* ===== MODAL CONFIRMATION ===== */
#modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,21,48,0.55);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 2000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
#modal-overlay.show { opacity: 1; pointer-events: auto; }
#modal-card {
  background: var(--white);
  border-radius: 26px 26px 0 0;
  padding: 22px 22px calc(22px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 480px;
  text-align: center;
  transform: translateY(100%);
  transition: transform 0.25s ease;
}
#modal-overlay.show #modal-card { transform: translateY(0); }
#modal-icon {
  width: 64px; height: 64px;
  margin: 0 auto 12px;
  object-fit: contain;
}
#modal-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 4px;
}
#modal-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 18px;
  line-height: 1.5;
}
#modal-actions {
  display: flex;
  gap: 10px;
}
.modal-btn {
  flex: 1;
  padding: 13px;
  border-radius: var(--radius-sm);
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  border: none;
}
.modal-btn.confirm {
  background: linear-gradient(135deg, var(--violet-600), var(--violet-700));
  color: var(--white);
  box-shadow: var(--shadow-btn);
}
.modal-btn.cancel {
  background: var(--violet-50);
  color: var(--muted);
}
.modal-btn.danger {
  background: #FDEDED;
  color: #D64545;
}

/* ===== CELEBRATION (palier 1000) ===== */
#celebration-overlay {
  position: fixed;
  inset: 0;
  background: rgba(45,27,105,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
#celebration-overlay.show { opacity: 1; pointer-events: auto; }
#celebration-card {
  text-align: center;
  padding: 30px;
  transform: scale(0.6);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#celebration-overlay.show #celebration-card { transform: scale(1); }
#celebration-cup {
  width: 160px; height: 160px;
  object-fit: contain;
  filter: drop-shadow(0 16px 32px rgba(0,0,0,0.4));
  animation: cupBounce 1.4s ease-in-out infinite;
}
@keyframes cupBounce {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-12px) rotate(-4deg); }
  75% { transform: translateY(-12px) rotate(4deg); }
}
#celebration-title {
  color: var(--white);
  font-size: 26px;
  font-weight: 800;
  margin-top: 18px;
}
#celebration-sub {
  color: rgba(255,255,255,0.8);
  font-size: 14px;
  margin-top: 6px;
}
#celebration-close {
  margin-top: 22px;
  padding: 12px 32px;
  background: var(--white);
  color: var(--violet-700);
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
</style>
</head>

<script>
let map, playerMarker, radarCircle;
let followMode = true; // tant que true, la carte suit la position GPS automatiquement

// Fix hauteur réelle viewport pour Safari iOS (barre d'adresse dynamique)
function setAppHeight() {
  document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
  document.documentElement.classList.add('js-vh-fix');
}
setAppHeight();
window.addEventListener('resize', setAppHeight);
window.addEventListener('orientationchange', setAppHeight);

let currentPos = null;
let crosswalks = new Map(); // id -> { lat, lng, marker, collected }
let nearbyIds = [];
const RADIUS_M = 20;
const LOAD_RADIUS = 700;
let lastLoadPos = null;
let parisTotalCount = null;
let parisTotalLoading = false;
let modalTargetId = null; // id du passage concerné par le modal ouvert

// Bounding box stricte de Paris intra-muros (pour exclure la banlieue)
const PARIS_BOUNDS = { south: 48.8156, west: 2.2241, north: 48.9022, east: 2.4699 };
const PARIS_BBOX = `${PARIS_BOUNDS.south},${PARIS_BOUNDS.west},${PARIS_BOUNDS.north},${PARIS_BOUNDS.east}`;

function isInParis(lat, lng) {
  return lat >= PARIS_BOUNDS.south && lat <= PARIS_BOUNDS.north &&
         lng >= PARIS_BOUNDS.west && lng <= PARIS_BOUNDS.east;
}

let demoMode = false;

function startApp(demo) {
  demoMode = !!demo;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initMap();
  if (demoMode) {
    startDemoMode();
  } else {
    startGPS();
  }
  loadParisTotal();
}

function startDemoMode() {
  document.getElementById('gps-text').textContent = 'Mode démo';
  document.getElementById('gps-dot').classList.add('active');
  showToast('Mode démo : déplace la carte pour explorer Paris');

  // Position de départ : centre de Paris (Notre-Dame)
  const startLat = 48.8530, startLng = 2.3499;
  currentPos = { lat: startLat, lng: startLng };
  playerMarker.setLatLng([startLat, startLng]);
  radarCircle.setLatLng([startLat, startLng]);
  map.setView([startLat, startLng], 17);
  loadCrosswalksNear(startLat, startLng);
  lastLoadPos = { lat: startLat, lng: startLng };

  // En mode démo, la position "joueur" suit le centre de la carte qu'on déplace à la main
  map.on('move', () => {
    const center = map.getCenter();
    currentPos = { lat: center.lat, lng: center.lng };
    playerMarker.setLatLng([center.lat, center.lng]);
    radarCircle.setLatLng([center.lat, center.lng]);
    updateNearby();
  });
  map.on('moveend', () => {
    const center = map.getCenter();
    if (!lastLoadPos || distM(center.lat, center.lng, lastLoadPos.lat, lastLoadPos.lng) > LOAD_RADIUS * 0.5) {
      loadCrosswalksNear(center.lat, center.lng);
      lastLoadPos = { lat: center.lat, lng: center.lng };
    }
  });
}

function initMap() {
  map = L.map('map', {
    zoomControl: false,
    attributionControl: false,
    tap: true,
    dragging: false,
    touchZoom: true,
    scrollWheelZoom: true,
    doubleClickZoom: true,
    markerZoomAnimation: false
  }).setView([48.8566, 2.3522], 17);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, subdomains: 'abcd', attribution: '© OSM © CARTO'
  }).addTo(map);
  L.control.attribution({ prefix: false, position: 'bottomleft' }).addTo(map);

  // Dès que l'utilisateur déplace la carte à la main, on désactive le recentrage auto
  map.on('dragstart', () => { followMode = false; });
  map.on('zoomstart', (e) => {
    if (e.hard !== true) followMode = false;
  });

  // Charge les passages autour du centre de la carte chaque fois qu'on la déplace,
  // même si on n'est pas physiquement à Paris (exploration libre au doigt)
  map.on('moveend', () => {
    const center = map.getCenter();
    if (!lastLoadPos || distM(center.lat, center.lng, lastLoadPos.lat, lastLoadPos.lng) > LOAD_RADIUS * 0.5) {
      loadCrosswalksNear(center.lat, center.lng);
      lastLoadPos = { lat: center.lat, lng: center.lng };
    }
  });

  const playerHtml = `
    <div class="player-icon-wrap">
      <div class="player-icon-halo"></div>
      <svg class="player-arrow" id="player-arrow-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2 L19 21 L12 16.5 L5 21 Z" fill="#6C4FE0" stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
    </div>`;
  const playerDiv = L.divIcon({ className: '', html: playerHtml, iconSize: [34,34], iconAnchor: [17,17] });
  playerMarker = L.marker([48.8566, 2.3522], { icon: playerDiv, zIndexOffset: 1000 }).addTo(map);

  radarCircle = L.circle([48.8566, 2.3522], {
    radius: RADIUS_M,
    className: 'radar-leaflet-circle',
    color: '#6C4FE0',
    weight: 1.5,
    opacity: 0.75,
    fillColor: '#6C4FE0',
    fillOpacity: 0.08,
    interactive: false
  }).addTo(map);

  startRadarBreathing();

  setupMapGestures();
}

let mapRotationDeg = 0;

function setupMapGestures() {
  const wrapEl = document.getElementById('map-wrap');
  const mapEl = document.getElementById('map');
  if (!wrapEl || !mapEl) return;

  let mode = null; // 'pan' ou 'rotate'
  let startAngle = null;
  let startRotation = 0;
  let panLastPoint = null;

  function angleBetween(t0, t1) {
    return Math.atan2(t1.clientY - t0.clientY, t1.clientX - t0.clientX) * (180 / Math.PI);
  }

  // Fait tourner un vecteur (dx, dy) de -angleDeg degrés, pour compenser la rotation visuelle de la carte
  function rotateVector(dx, dy, angleDeg) {
    const rad = -angleDeg * Math.PI / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);
    return {
      x: dx * cos - dy * sin,
      y: dx * sin + dy * cos
    };
  }

  wrapEl.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      mode = 'rotate';
      startAngle = angleBetween(e.touches[0], e.touches[1]);
      startRotation = mapRotationDeg;
      mapEl.classList.add('rotating');
      panLastPoint = null;
    } else if (e.touches.length === 1) {
      mode = 'pan';
      panLastPoint = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      followMode = false;
    }
  }, { passive: true });

  wrapEl.addEventListener('touchmove', (e) => {
    if (mode === 'rotate' && e.touches.length === 2 && startAngle !== null) {
      const currentAngle = angleBetween(e.touches[0], e.touches[1]);
      const delta = currentAngle - startAngle;
      mapRotationDeg = startRotation + delta;
      mapEl.style.transform = `rotate(${mapRotationDeg}deg)`;
    } else if (mode === 'pan' && e.touches.length === 1 && panLastPoint) {
      e.preventDefault();
      const point = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      const dx = point.x - panLastPoint.x;
      const dy = point.y - panLastPoint.y;
      // On compense la rotation visuelle pour que le geste reste intuitif
      const compensated = rotateVector(dx, dy, mapRotationDeg);
      map.panBy([-compensated.x, -compensated.y], { animate: false });
      panLastPoint = point;
    }
  }, { passive: false });

  wrapEl.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) {
      startAngle = null;
      mapEl.classList.remove('rotating');
    }
    if (e.touches.length === 0) {
      mode = null;
      panLastPoint = null;
    }
  }, { passive: true });
}

function startRadarBreathing() {
  const baseRadius = RADIUS_M;
  const amplitude = RADIUS_M * 0.12; // légère variation de +/- 12%
  const durationMs = 3200;
  const startTime = Date.now();

  function tick() {
    if (!radarCircle) return;
    const elapsed = (Date.now() - startTime) % durationMs;
    const phase = (elapsed / durationMs) * Math.PI * 2;
    const radius = baseRadius + Math.sin(phase) * amplitude;
    radarCircle.setRadius(radius);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function startGPS() {
  if (!navigator.geolocation) {
    showToast('GPS non disponible sur cet appareil');
    return;
  }
  navigator.geolocation.watchPosition(onPosition, onGPSError, {
    enableHighAccuracy: true, maximumAge: 3000, timeout: 15000
  });
  startCompass();
}

let currentHeading = 0;
let rawHeadingAccum = 0; // angle cumulé non bouclé, pour une rotation toujours fluide
function setPlayerHeading(deg) {
  // Normalise deg dans [0, 360)
  deg = ((deg % 360) + 360) % 360;

  // Calcule la différence la plus courte par rapport à l'angle cumulé actuel
  let diff = deg - (((rawHeadingAccum % 360) + 360) % 360);
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;

  rawHeadingAccum += diff;
  currentHeading = deg;

  const svg = document.getElementById('player-arrow-svg');
  if (svg) svg.style.transform = `rotate(${rawHeadingAccum}deg)`;
}

function startCompass() {
  // Priorité à la boussole native du téléphone (cap réel, fiable même immobile)
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+ nécessite une permission explicite, déclenchée par un geste utilisateur
    document.body.addEventListener('click', requestCompassPermissionOnce, { once: true });
  } else {
    window.addEventListener('deviceorientationabsolute', onDeviceOrientation);
    window.addEventListener('deviceorientation', onDeviceOrientation);
  }
}

let compassPermissionRequested = false;
function requestCompassPermissionOnce() {
  if (compassPermissionRequested) return;
  compassPermissionRequested = true;
  DeviceOrientationEvent.requestPermission().then(state => {
    if (state === 'granted') {
      window.addEventListener('deviceorientationabsolute', onDeviceOrientation);
      window.addEventListener('deviceorientation', onDeviceOrientation);
    }
  }).catch(() => {});
}

function onDeviceOrientation(e) {
  let heading = null;
  if (typeof e.webkitCompassHeading === 'number') {
    heading = e.webkitCompassHeading; // iOS Safari : déjà le cap réel (0 = nord)
  } else if (e.absolute && typeof e.alpha === 'number') {
    heading = 360 - e.alpha; // Android : alpha inversé par rapport au cap
  }
  if (heading !== null && !isNaN(heading)) {
    smoothedHeadingUpdate(heading);
  }
}

let lastHeadingUpdate = 0;
function smoothedHeadingUpdate(deg) {
  // On limite la fréquence de mise à jour pour éviter les tremblements/saccades
  const now = Date.now();
  if (now - lastHeadingUpdate < 150) return;
  lastHeadingUpdate = now;
  setPlayerHeading(deg);
}

function onPosition(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  currentPos = { lat, lng };

  document.getElementById('gps-text').textContent = 'GPS actif';
  document.getElementById('gps-dot').classList.add('active');

  playerMarker.setLatLng([lat, lng]);
  radarCircle.setLatLng([lat, lng]);

  // Fallback : si la boussole magnétique n'a pas encore donné de cap fiable,
  // on utilise le cap de déplacement du GPS (disponible seulement en mouvement)
  if (typeof pos.coords.heading === 'number' && !isNaN(pos.coords.heading) && pos.coords.speed > 0.5) {
    setPlayerHeading(pos.coords.heading);
  }

  if (!lastLoadPos || distM(lat, lng, lastLoadPos.lat, lastLoadPos.lng) > LOAD_RADIUS * 0.5) {
    if (followMode) map.setView([lat, lng], 17, { animate: true, duration: 1 });
    loadCrosswalksNear(lat, lng);
    lastLoadPos = { lat, lng };
  } else if (followMode) {
    map.setView([lat, lng], map.getZoom(), { animate: true, duration: 0.4 });
  }

  updateNearby();
}

function onGPSError(err) {
  document.getElementById('gps-text').textContent = 'Erreur GPS';
  document.getElementById('gps-dot').classList.remove('active');
  if (err.code === 1) showToast('Autorise le GPS dans ton navigateur');
  else showToast('Signal GPS faible, patiente...');
}

async function loadCrosswalksNear(lat, lng) {
  // Si le centre visé est hors de Paris, on ne charge rien à cet endroit
  // (mais on n'affiche pas de toast : l'utilisateur explore peut-être la carte vers Paris)
  if (!isInParis(lat, lng)) {
    return;
  }

  const d = 0.0063;
  // On limite la zone de requête à l'intersection avec Paris intra-muros
  const south = Math.max(lat - d, PARIS_BOUNDS.south);
  const west = Math.max(lng - d, PARIS_BOUNDS.west);
  const north = Math.min(lat + d, PARIS_BOUNDS.north);
  const east = Math.min(lng + d, PARIS_BOUNDS.east);
  const bbox = `${south},${west},${north},${east}`;

  const query = `[out:json][timeout:15];node["highway"="crossing"](${bbox});out body;`;
  const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    processCrosswalks(data.elements || []);
  } catch(e) {
    showToast('Erreur réseau — recharge si besoin');
  }
}

function updateNearby() {
  if (!currentPos) return;
  nearbyIds = [];
  crosswalks.forEach((cw, id) => {
    if (cw.collected) return;
    const dist = distM(currentPos.lat, currentPos.lng, cw.lat, cw.lng);
    const isNear = dist <= RADIUS_M;
    if (isNear) nearbyIds.push(id);
    const div = document.getElementById('cwdiv-' + id);
    if (div) div.classList.toggle('nearby', isNear);
  });
  document.getElementById('s-nearby').textContent = nearbyIds.length;

function collectNearby() {
  if (nearbyIds.length === 0) return;
  openModal(nearbyIds[0]);
}

/* ===== MODAL : ouverture / fermeture / confirmation ===== */
function openModal(id) {
  const cw = crosswalks.get(id);
  if (!cw) return;
  modalTargetId = id;

  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  const sub = document.getElementById('modal-sub');
  const confirmBtn = document.getElementById('modal-confirm-btn');

  if (cw.collected) {
    title.textContent = 'Dévalider ce passage ?';
    sub.textContent = 'Ce passage est marqué comme validé. Tu peux annuler cette validation.';
    confirmBtn.textContent = 'Dévalider';
    confirmBtn.className = 'modal-btn danger';
  } else {
    title.textContent = 'Valider ce passage ?';
    sub.textContent = 'Confirme que tu as bien franchi ce passage piéton.';
    confirmBtn.textContent = 'Valider';
    confirmBtn.className = 'modal-btn confirm';
  }

  overlay.classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  modalTargetId = null;
}

function confirmModalAction() {
  const id = modalTargetId;
  if (!id) return;

  if (id === 'RESET_ALL') {
    resetAll();
    closeModal();
    return;
  }

  const cw = crosswalks.get(id);
  if (!cw) { closeModal(); return; }

  if (cw.collected) {
    uncollect(id);
  } else {
    tryCollect(id);
  }
  closeModal();
}

function tryCollect(id) {
  const cw = crosswalks.get(id);
  if (!cw || cw.collected) return;

  if (currentPos) {
    const dist = distM(currentPos.lat, currentPos.lng, cw.lat, cw.lng);
    if (dist > RADIUS_M * 2) {
      showToast('Trop loin — approche-toi du passage');
      return;
    }
  }

  cw.collected = true;

  const saved = getSaved();
  const levelBefore = getLevel(saved.length);
  saved.push(id);
  localStorage.setItem('walko_collected', JSON.stringify(saved));
  const levelAfter = getLevel(saved.length);

function showCelebration(total) {
  document.getElementById('celebration-sub-text').textContent = `${total.toLocaleString('fr-FR')} passages validés`;
  document.getElementById('celebration-overlay').classList.add('show');
}
function closeCelebration() {
  document.getElementById('celebration-overlay').classList.remove('show');
}

function uncollect(id) {
  const cw = crosswalks.get(id);
  if (!cw || !cw.collected) return;

  cw.collected = false;

  const saved = getSaved().filter(x => x !== id);
  localStorage.setItem('walko_collected', JSON.stringify(saved));

  const div = document.getElementById('cwdiv-' + id);
  if (div) div.innerHTML = '<div class="cw-pending"></div>';

  refreshCounts();
  updateNearby();
  showToast('Validation annulée');
}

function refreshCounts() {
  const saved = getSaved();
  document.getElementById('s-collected').textContent = saved.length;

  let remaining = '—';
  let pct = 0;
  if (parisTotalCount) {
    remaining = Math.max(parisTotalCount - saved.length, 0);
    pct = Math.min(Math.round((saved.length / parisTotalCount) * 100), 100);
  }
  document.getElementById('s-total').textContent = remaining;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('progress-detail').textContent =
    parisTotalCount ? `${saved.length} / ${parisTotalCount} passages validés` : `${saved.length} passages validés`;

  const level = getLevel(saved.length);
  document.getElementById('level-num').textContent = level;
}

async function loadParisTotal() {
  if (parisTotalLoading) return;
  parisTotalLoading = true;
  document.getElementById('progress-detail').textContent = 'Calcul...';

  const query = `[out:json][timeout:25];node["highway"="crossing"](${PARIS_BBOX});out count;`;
  const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    const count = data.elements && data.elements[0] && data.elements[0].tags
      ? parseInt(data.elements[0].tags.total)
      : null;
    if (count) {
      parisTotalCount = count;
      refreshCounts();
    }
  } catch(e) {
    // silencieux, on retentera plus tard
  } finally {
    parisTotalLoading = false;
  }
}

function recenter() {
  if (currentPos) {
    followMode = true;
    map.setView([currentPos.lat, currentPos.lng], 17, { animate: true });
  } else {
    showToast('Position GPS non disponible');
  }
}

function distM(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ===== RESET (appui long sur le logo Walko) ===== */
let longPressTimer = null;
function startLongPress() {
  longPressTimer = setTimeout(openResetModal, 600);
}
function cancelLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}
function openResetModal() {
  modalTargetId = 'RESET_ALL';
  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  const sub = document.getElementById('modal-sub');
  const confirmBtn = document.getElementById('modal-confirm-btn');

  title.textContent = 'Réinitialiser tous les passages ?';
  sub.textContent = 'Tous tes passages validés seront effacés. Cette action est irréversible.';
  confirmBtn.textContent = 'Tout réinitialiser';
  confirmBtn.className = 'modal-btn danger';

  overlay.classList.add('show');
}
function resetAll() {
  localStorage.setItem('walko_collected', '[]');
  crosswalks.forEach((cw, id) => {
    if (cw.collected) {
      cw.collected = false;
      const div = document.getElementById('cwdiv-' + id);
      if (div) div.innerHTML = '<div class="cw-pending"></div>';
    }
  });
  refreshCounts();
  updateNearby();
  showToast('Tous les passages ont été réinitialisés');
}

// Paliers de niveaux : niveau 1 = départ, niveau 2 dès le premier passage, puis paliers suivants
const LEVEL_THRESHOLDS = [0, 1, 10, 50, 100, 500, 1000, 1100, 1500, 2000, 2100];
function getLevel(total) {
  let level = 1;
  for (let i = 0; i < LEVEL_THRESHOLDS.length; i++) {
    if (total >= LEVEL_THRESHOLDS[i]) level = i + 1;
  }
  // Au-delà du dernier palier défini, on continue à monter de niveau tous les 500
  if (total > LEVEL_THRESHOLDS[LEVEL_THRESHOLDS.length - 1]) {
    const extra = Math.floor((total - LEVEL_THRESHOLDS[LEVEL_THRESHOLDS.length - 1]) / 500);
    level = LEVEL_THRESHOLDS.length + extra;
  }
  return level;
}

function getSaved() {
  try { return JSON.parse(localStorage.getItem('walko_collected') || '[]'); }
  catch { return []; }
}

let toastTimer;
function showToast(msg, icon) {
  const t = document.getElementById('toast');
  t.innerHTML = (icon ? `<img src="${icon}" alt="">` : '') + `<span>${msg}</span>`;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
